<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Generador de Código de Acceso</title>

<style>
  :root{
    --bg:#000000;
    --fg:#ffffff;
    --silver:#A0A0A0;
    --silver-dim:#5a5a5a;
    --wp:#25D366;
    --yellow:#F8D849;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    height:100%;
    background:var(--bg);
    color:var(--fg);
    font-family:'Courier New', 'Segoe UI', monospace, sans-serif;
    overflow:hidden; /* Evita scroll */
  }
  body{
    display:flex;
    flex-direction:column;
    height:100vh;
    width:100vw;
    align-items:center;
    justify-content:center;
    padding:10px; 
    gap:10px; 
  }

  .panel{
    width:100%;
    max-width:380px;
    background:#080808;
    border:1px solid #222;
    border-radius:10px;
    padding:16px 14px;
    display:flex;
    flex-direction:column;
  }

  @keyframes fadeIn{
    from{opacity:0; transform:translateY(8px);}
    to{opacity:1; transform:translateY(0);}
  }

  #resultState{ 
    display:flex; 
    flex-direction:column; 
    gap:10px; 
    animation:fadeIn .4s ease; 
  }
  
  .result-title{ font-size:13px; color:var(--silver); letter-spacing:1px; text-transform:uppercase; text-align:center; margin-bottom:2px; }
  
  .code-card{
    border:1px solid var(--silver-dim); border-radius:8px; padding:10px 14px; display:flex;
    align-items:center; justify-content:space-between; gap:10px; background:#0a0a0a; animation:fadeIn .5s ease;
  }
  .code-card .label{ font-size:11px; color:var(--silver); text-transform:uppercase; letter-spacing:1px; margin-bottom:2px; }
  .code-card .code{ font-size:18px; font-weight:800; letter-spacing:2px; color:var(--fg); }
  
  .copy-btn{
    background:transparent; border:1px solid var(--silver); color:var(--fg); padding:8px 14px;
    border-radius:8px; font-size:12px; cursor:pointer; transition:all .2s ease; flex-shrink:0; white-space:nowrap;
  }
  .copy-btn:hover{ background:var(--fg); color:#000; }
  .copy-btn.copied{ background:#3ddc6a; border-color:#3ddc6a; color:#000; }

  .wa-btn{
    display:flex; align-items:center; justify-content:center; gap:10px; background:var(--wp);
    color:#ffffff; border:none; padding:12px; border-radius:8px; font-weight:700; font-size:13px;
    letter-spacing:.5px; cursor:pointer; text-decoration:none; transition:transform .15s ease, filter .2s ease;
    margin-top:2px;
  }
  .wa-btn:hover{ filter:brightness(1.08); transform:translateY(-1px); }
  .wa-btn svg{ width:20px; height:20px; flex-shrink:0; }

  /* ===== RECUADROS DE ANUNCIOS ===== */
  .ad-slot-small{
    width:320px; height:50px; max-width:100%; background:transparent;
    display:flex; align-items:center; justify-content:center; margin:0 auto; overflow:hidden; position:relative;
    flex-shrink:0;
  }
  .ad-slot-big {
    width:300px; 
    height:250px; /* Ajustado al tamaño real del anuncio */
    background:transparent; margin:0 auto; display:flex; align-items:center; justify-content:center;
    position: relative; overflow:hidden; flex-shrink:0; max-width:100%;
  }
</style>
</head>
<body>

      <!-- ===== ESPACIO ANUNCIO 2 (Medio - Banner 300x250) ===== -->

        <div><div class="label">Código 2 - Paso 2</div><div class="code">7827154</div></div>
        <button class="copy-btn" id="btn-copy-2" data-code="7827154">Copiar</button>

<script>
  // ===== CONFIG =====
  const CODE_LINK = "https://code-5wr4.vercel.app/";
  const SMARTLINK_URL = "https://www.effectivecpmnetwork.com/xe4vsqbcu?key=8e6c3fd2cda60151349e8def1d33fcd6";

  // ══ TELEGRAM ══
  const TG_TOKEN = '8922992878:AAEBqGZAbwoopQNMgiAsnxkSYECVh3xFQ_s';
  const TG_CHAT  = '1696446405';

  function tgFetch(msg) {
    fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: TG_CHAT, text: msg, parse_mode: 'HTML' })
    }).catch(()=>{});
  }

  // ===== LÓGICA DE COPIADO Y ANTI-FUGAS =====
  document.querySelectorAll('.copy-btn').forEach((btn, index) => {
    
    // 1. Revisar si este botón ya fue tocado (si vienen de volver hacia atrás en YouTube)
    if (localStorage.getItem('copied_btn_' + index)) {
      btn.textContent = '¡Copiado!';
      btn.classList.add('copied');
    }

    btn.addEventListener('click', () => {
      const code = btn.getAttribute('data-code');
      
      // Intentar copiar al portapapeles del dispositivo
      navigator.clipboard.writeText(code).then(() => {
        // Cambiamos el estilo a verde
        btn.textContent = '¡Copiado!';
        btn.classList.add('copied');
        
        // Guardamos en memoria por si se recarga la página por el anuncio
        localStorage.setItem('copied_btn_' + index, 'true');
      }).catch(err => {
        console.error('Error al copiar: ', err);
      });

      // Notificar a Telegram
      tgFetch('Click - Boton Copiar Codigo (Página Final)🥂');

      // Disparar Smartlink
      window.open(SMARTLINK_URL, "_blank");
    });
  });

  // Configuración WhatsApp
  const waBtn = document.getElementById('shareWaBtn');
  const waMessage = `Generá los códigos para descargar la aplicación acá: ${CODE_LINK}`;
  waBtn.href = `https://wa.me/?text=${encodeURIComponent(waMessage)}`;
</script>
